{% extends "base.html" %}

{% block title %}EduGenie AI - Single-Page Educational Assistant{% endblock %}

{% block content %}
<div class="container" style="max-width: 1200px; margin: 2rem auto; padding: 0 1rem;">
    <!-- Welcome Header Section -->
    <div style="text-align: center; margin-bottom: 3rem; animation: fadeIn 1s ease-out;">
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome to EduGenie 🧠✨</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Your personal AI tutor for learning support!</p>
    </div>

    <!-- Responsive Grid Dashboard of Forms -->
    <div class="features-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem;">
        
        <!-- 1. Q&A Form Card -->
        <div class="glass-panel" style="padding: 2rem; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div class="feature-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-bottom: 1rem;">
                    <i class="fas fa-question-circle"></i>
                </div>
                <form id="qaForm">
                    <label style="font-size: 1.1rem; display: block; margin-bottom: 0.5rem;"><strong>Ask EduGenie a Question:</strong></label>
                    <input type="text" id="question" placeholder="Why is the sky blue?" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-weight: bold;">Get Answer</button>
                </form>
            </div>
            <div id="qaResult" class="output" style="margin-top: 1.5rem; max-height: 250px; overflow-y: auto; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 0.9rem; line-height: 1.5; display: none;"></div>
        </div>

        <!-- 2. Explanation Form Card -->
        <div class="glass-panel" style="padding: 2rem; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div class="feature-icon" style="background: rgba(167, 139, 250, 0.1); color: #a78bfa; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-bottom: 1rem;">
                    <i class="fas fa-lightbulb"></i>
                </div>
                <form id="explainForm">
                    <label style="font-size: 1.1rem; display: block; margin-bottom: 0.5rem;"><strong>Need an Explanation?</strong></label>
                    <input type="text" id="topic" placeholder="Photosynthesis" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-weight: bold; background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);">Explain</button>
                </form>
            </div>
            <div id="explanationResult" class="output" style="margin-top: 1.5rem; max-height: 250px; overflow-y: auto; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 0.9rem; line-height: 1.5; display: none;"></div>
        </div>

        <!-- 3. Summary Form Card -->
        <div class="glass-panel" style="padding: 2rem; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div class="feature-icon" style="background: rgba(236, 72, 153, 0.1); color: #ec4899; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-bottom: 1rem;">
                    <i class="fas fa-file-alt"></i>
                </div>
                <form id="summaryForm">
                    <label style="font-size: 1.1rem; display: block; margin-bottom: 0.5rem;"><strong>Summarize a Paragraph:</strong></label>
                    <input type="text" id="summaryText" placeholder="Paste long content to summarize" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-weight: bold; background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);">Summarize</button>
                </form>
            </div>
            <div id="summaryResult" class="output" style="margin-top: 1.5rem; max-height: 250px; overflow-y: auto; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 0.9rem; line-height: 1.5; display: none;"></div>
        </div>

        <!-- 4. Quiz Form Card -->
        <div class="glass-panel" style="padding: 2rem; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div class="feature-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-bottom: 1rem;">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <form id="quizForm">
                    <label style="font-size: 1.1rem; display: block; margin-bottom: 0.5rem;"><strong>Generate a Quiz:</strong></label>
                    <input type="text" id="quizText" placeholder="Solar System" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-weight: bold; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">Generate Quiz</button>
                </form>
            </div>
            <div id="quizResult" class="output" style="margin-top: 1.5rem; max-height: 250px; overflow-y: auto; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 0.9rem; line-height: 1.5; display: none;"></div>
        </div>

        <!-- 5. Learning Recommendations Form Card -->
        <div class="glass-panel" style="padding: 2rem; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; grid-column: span 1;">
            <div>
                <div class="feature-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin-bottom: 1rem;">
                    <i class="fas fa-route"></i>
                </div>
                <form id="recommendForm">
                    <label style="font-size: 1.1rem; display: block; margin-bottom: 0.5rem;"><strong>Generate a Learning Path:</strong></label>
                    <input type="text" id="recommendTopic" placeholder="Data Science" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-weight: bold; background: linear-gradient(135deg, #10b981 0%, #059669 100%);">Generate Roadmap</button>
                </form>
            </div>
            <div id="recommendationResult" class="output" style="margin-top: 1.5rem; max-height: 250px; overflow-y: auto; padding: 1rem; border-radius: 8px; background: rgba(0,0,0,0.2); font-size: 0.9rem; line-height: 1.5; display: none;"></div>
        </div>

    </div>
</div>

<!-- Dynamic Integration Javascript -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const showSpinner = (element) => {
        element.style.display = "block";
        element.innerHTML = '<div style="text-align:center; padding:1rem;"><i class="fas fa-circle-notch fa-spin" style="font-size:1.5rem; color:var(--primary);"></i><p style="margin-top:0.5rem; font-size:0.8rem; color:var(--text-muted);">Generating response...</p></div>';
    };

    // 1. Q&A Form Submission
    document.getElementById("qaForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const question = document.getElementById("question").value.strip ? document.getElementById("question").value.trim() : document.getElementById("question").value;
        const resultDiv = document.getElementById("qaResult");
        showSpinner(resultDiv);

        try {
            const response = await fetch(`/qa?question=${encodeURIComponent(question)}`);
            const data = await response.json();
            if (response.ok) {
                resultDiv.innerHTML = `<h4 style="font-weight:700; color:#3b82f6; margin-bottom:0.5rem;">Answer:</h4><p style="white-space: pre-wrap;">${data.answer}</p>`;
            } else {
                resultDiv.innerHTML = `<p style="color:#ef4444;">Error: ${data.error || "Failed to get answer."}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p style="color:#ef4444;">Connection error. Please try again.</p>`;
        }
    });

    // 2. Explanation Form Submission
    document.getElementById("explainForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const topic = document.getElementById("topic").value;
        const resultDiv = document.getElementById("explanationResult");
        showSpinner(resultDiv);

        try {
            const response = await fetch('/explain/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: topic })
            });
            const data = await response.json();
            if (response.ok) {
                resultDiv.innerHTML = `<h4 style="font-weight:700; color:#a78bfa; margin-bottom:0.5rem;">Explanation for "${data.topic}":</h4><p style="white-space: pre-wrap;">${data.explanation}</p>`;
            } else {
                resultDiv.innerHTML = `<p style="color:#ef4444;">Error: ${data.error || "Failed to get explanation."}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p style="color:#ef4444;">Connection error. Please try again.</p>`;
        }
    });

    // 3. Summary Form Submission
    document.getElementById("summaryForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = document.getElementById("summaryText").value;
        const resultDiv = document.getElementById("summaryResult");
        showSpinner(resultDiv);

        try {
            const response = await fetch('/summarize/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();
            if (response.ok) {
                resultDiv.innerHTML = `<h4 style="font-weight:700; color:#ec4899; margin-bottom:0.5rem;">Summary:</h4><p style="white-space: pre-wrap;">${data.summary}</p>`;
            } else {
                resultDiv.innerHTML = `<p style="color:#ef4444;">Error: ${data.error || "Failed to get summary."}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p style="color:#ef4444;">Connection error. Please try again.</p>`;
        }
    });

    // 4. Quiz Form Submission
    document.getElementById("quizForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = document.getElementById("quizText").value;
        const resultDiv = document.getElementById("quizResult");
        showSpinner(resultDiv);

        try {
            const response = await fetch('/quiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();
            if (response.ok) {
                let quizHtml = `<h4 style="font-weight:700; color:#f59e0b; margin-bottom:0.8rem;">Generated Quiz:</h4>`;
                data.quiz.forEach((q, idx) => {
                    quizHtml += `
                    <div style="margin-bottom:1rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:0.8rem;">
                        <p style="font-weight:600;">Q${idx+1}: ${q.question}</p>
                        <div style="margin-top:0.4rem; display:flex; flex-direction:column; gap:0.3rem;">
                            ${q.options.map(opt => `
                                <button class="quiz-option-btn" onclick="verifyAnswer(this, '${opt}', '${q.answer}')" style="text-align:left; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); padding:0.5rem; border-radius:6px; color:white; cursor:pointer; font-size:0.85rem; transition: all 0.2s;">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    `;
                });
                resultDiv.innerHTML = quizHtml;
            } else {
                resultDiv.innerHTML = `<p style="color:#ef4444;">Error: ${data.error || "Failed to generate quiz."}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p style="color:#ef4444;">Connection error. Please try again.</p>`;
        }
    });

    // 5. Learning Path Form Submission
    document.getElementById("recommendForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const topic = document.getElementById("recommendTopic").value;
        const resultDiv = document.getElementById("recommendationResult");
        showSpinner(resultDiv);

        try {
            const response = await fetch(`/learn/recommendations?topic=${encodeURIComponent(topic)}`);
            const data = await response.json();
            if (response.ok) {
                resultDiv.innerHTML = `<h4 style="font-weight:700; color:#10b981; margin-bottom:0.5rem;">Roadmap for "${data.topic}":</h4><p style="white-space: pre-wrap; font-family: monospace; background:rgba(0,0,0,0.3); padding:0.8rem; border-radius:6px;">${data.recommendation}</p>`;
            } else {
                resultDiv.innerHTML = `<p style="color:#ef4444;">Error: ${data.error || "Failed to get roadmap."}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p style="color:#ef4444;">Connection error. Please try again.</p>`;
        }
    });

});

// Helper function to check quiz option click
function verifyAnswer(button, selected, correct) {
    const parent = button.parentElement;
    const siblingButtons = parent.querySelectorAll(".quiz-option-btn");
    siblingButtons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText.trim() === correct.trim()) {
            btn.style.background = "rgba(16, 185, 129, 0.2)";
            btn.style.borderColor = "#10b981";
        } else if (btn === button) {
            btn.style.background = "rgba(239, 68, 68, 0.2)";
            btn.style.borderColor = "#ef4444";
        }
    });
}
</script>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
.quiz-option-btn:hover {
    background: rgba(255, 255, 255, 0.08) !important;
}
</style>
{% endblock %}
